name: Build Open3D TSDF (iOS)

# Builds the standalone open3d-tsdf static library (TSDF integration subsystem
# extracted from Open3D v0.19.0) for BOTH arm64-apple-ios AND arm64-apple-ios-simulator,
# then bundles both slices into a single fat XCFramework for SwiftPM .binaryTarget use.
#
# Source: dependency/manual/open3d-tsdf/  (MIT, derived from Open3D v0.19.0)
# Only compiles:
#   - UniformTSDFVolume.cpp / ScalableTSDFVolume.cpp (TSDF algorithm)
#   - Image.cpp / ImageFactory.cpp (depth-image type)
# External dep: Eigen 5.0.1 only (header-only).
#
# Eigen strategy:
#   - Device build: Conan install → conan_toolchain.cmake (sets sysroot=iphoneos with FORCE)
#   - Simulator build: CMAKE_PREFIX_PATH pointing at device Conan output so that
#     find_package(Eigen3) resolves without using the Conan toolchain, which cannot
#     be overridden to iphonesimulator due to FORCE in the generated file.
#
# Trigger manually or on changes to the TSDF source or this workflow.
# Do NOT run on every commit — compile only when the Open3D pin changes.
on:
  workflow_dispatch:
  push:
    paths:
      - dependency/manual/open3d-tsdf/**
      - conan/recipes/open3d-tsdf/**
      - .github/workflows/build-open3d-ios.yml

# NOTE ON RUNNER PINNING
# GitHub Actions runners (macos-26) cannot be pinned to a commit SHA.
# Using a concrete version label is the closest available guarantee.
# Avoid macos-latest — it is a floating alias.

jobs:
  build-tsdf-ios:
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      # ── Checkout this repository ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # ── Restore build cache from previous run ───────────────────────────────
      - name: Restore build cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            build-tsdf-ios-device
            build-tsdf-ios-sim
          key: tsdf-ios-fat-${{ runner.os }}-${{ hashFiles('dependency/manual/open3d-tsdf/**', 'conan/recipes/open3d-tsdf/**') }}
          restore-keys: |
            tsdf-ios-fat-${{ runner.os }}-

      # ── Load build-tool versions from deps.json ─────────────────────────────
      # deps.json is the single source of truth for all versions and hashes.
      # To bump cmake, ninja, or conan: edit deps.json only.
      #
      # Layers of verification for cmake and ninja:
      #   1. API pre-flight: tag → commit SHA must match deps.json value
      #   2. Binary SHA-256: downloaded file content must match deps.json hash
      #
      # To bump cmake: update deps.json. Get the new SHA-256 from Kitware:
      #   curl -sL https://github.com/Kitware/CMake/releases/download/vX.Y.Z/cmake-X.Y.Z-SHA-256.txt \
      #     | grep macos-universal.tar.gz
      # To bump ninja: update deps.json. Get SHA-256 with:
      #   curl -sL <ninja-mac.zip-url> | shasum -a 256
      # To bump conan: find commit SHA on the release page, update deps.json.
      - name: Load build-tool versions from deps.json
        run: |
          python3 - << 'EOF'
          import json, os
          with open("deps.json") as f:
              d = json.load(f)
          bt = d["build_tools"]
          lines = [
              f"CMAKE_VERSION={bt['cmake']['version']}",
              f"CMAKE_COMMIT={bt['cmake']['commit']}",
              f"CMAKE_SHA256={bt['cmake']['sha256_macos_universal']}",
              f"NINJA_VERSION={bt['ninja']['version']}",
              f"NINJA_COMMIT={bt['ninja']['commit']}",
              f"NINJA_SHA256={bt['ninja']['sha256_mac']}",
              f"CONAN_COMMIT={bt['conan']['commit']}",
              f"OPEN3D_VERSION={d['cpp_deps']['open3d_tsdf']['version']}",
          ]
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write("\n".join(lines) + "\n")
          for line in lines:
              print(line)
          EOF

      - name: Install build tools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # ── Pre-flight: verify each tag points at the expected commit ────────
          # Handles both lightweight tags (type=commit) and annotated tags
          # (type=tag, which requires a second API call to dereference to a commit).
          # Fails immediately if the tag has been moved — before any download.
          resolve_tag_commit() {
            local repo="$1" tag="$2"
            local ref obj_type obj_sha
            ref=$(curl -fsSL -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/${repo}/git/ref/tags/${tag}")
            obj_type=$(printf '%s' "$ref" | python3 -c "import json,sys; print(json.load(sys.stdin)['object']['type'])")
            obj_sha=$(printf '%s'  "$ref" | python3 -c "import json,sys; print(json.load(sys.stdin)['object']['sha'])")
            if [ "$obj_type" = "tag" ]; then
              # Annotated tag: dereference tag object → commit
              curl -fsSL -H "Authorization: Bearer $GITHUB_TOKEN" \
                "https://api.github.com/repos/${repo}/git/tags/${obj_sha}" \
                | python3 -c "import json,sys; print(json.load(sys.stdin)['object']['sha'])"
            else
              printf '%s\n' "$obj_sha"
            fi
          }

          cmake_actual=$(resolve_tag_commit "Kitware/CMake" "v${CMAKE_VERSION}")
          if [ "$cmake_actual" != "$CMAKE_COMMIT" ]; then
            printf 'ERROR: cmake v%s tag has been moved\n  expected: %s\n  actual:   %s\n' \
              "$CMAKE_VERSION" "$CMAKE_COMMIT" "$cmake_actual" >&2
            exit 1
          fi
          printf 'cmake tag OK: %s\n' "$cmake_actual"

          ninja_actual=$(resolve_tag_commit "ninja-build/ninja" "v${NINJA_VERSION}")
          if [ "$ninja_actual" != "$NINJA_COMMIT" ]; then
            printf 'ERROR: ninja v%s tag has been moved\n  expected: %s\n  actual:   %s\n' \
              "$NINJA_VERSION" "$NINJA_COMMIT" "$ninja_actual" >&2
            exit 1
          fi
          printf 'ninja tag OK: %s\n' "$ninja_actual"

          # ── Download and verify binaries ─────────────────────────────────────
          # cmake — Kitware official binary; SHA-256 from their published checksum file
          curl -fsSL \
            "https://github.com/Kitware/CMake/releases/download/v${CMAKE_VERSION}/cmake-${CMAKE_VERSION}-macos-universal.tar.gz" \
            -o cmake.tar.gz
          echo "${CMAKE_SHA256}  cmake.tar.gz" | shasum -a 256 --check
          tar -xf cmake.tar.gz -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/cmake-${CMAKE_VERSION}-macos-universal/CMake.app/Contents/bin" >> "$GITHUB_PATH"

          # ninja — ninja-build official binary
          curl -fsSL \
            "https://github.com/ninja-build/ninja/releases/download/v${NINJA_VERSION}/ninja-mac.zip" \
            -o ninja.zip
          echo "${NINJA_SHA256}  ninja.zip" | shasum -a 256 --check
          unzip -q ninja.zip -d /usr/local/bin

          # conan — commit archive URL is immutable; no mutable tag in the URL
          pip install --quiet --break-system-packages \
            "https://github.com/conan-io/conan/archive/${CONAN_COMMIT}.tar.gz"
          conan profile detect --force

      # ── Install Eigen via Conan (device) ─────────────────────────────────────
      # Uses a committed lockfile that freezes the exact ConanCenter recipe
      # revision for eigen/5.0.1 against the ios-arm64 profile.
      # The simulator build reuses this output via CMAKE_PREFIX_PATH — Eigen is
      # header-only so its Eigen3Config.cmake is platform-agnostic.
      #
      # To regenerate conan/locks/ios-arm64.lock after bumping a dep:
      #   conan lock create --requires="eigen/5.0.1" \
      #     --lockfile-out=conan/locks/ios-arm64.lock \
      #     --profile:build=default \
      #     --settings os=iOS --settings os.version=16.0 --settings os.sdk=iphoneos \
      #     --settings arch=armv8 --settings compiler=apple-clang \
      #     --settings compiler.version=17 --settings compiler.libcxx=libc++ \
      #     --settings build_type=Release
      #   git add conan/locks/ios-arm64.lock && git commit -m "chore: refresh ios-arm64 conan lock"
      - name: Install Eigen (Conan — device)
        run: |
          conan install \
            --requires="eigen/5.0.1" \
            --lockfile=conan/locks/ios-arm64.lock \
            --output-folder=build-tsdf-ios-device \
            --build=missing \
            -g CMakeToolchain \
            -g CMakeDeps \
            --profile:build=default \
            --settings os=iOS \
            --settings os.version=16.0 \
            --settings os.sdk=iphoneos \
            --settings arch=armv8 \
            --settings compiler=apple-clang \
            --settings compiler.version=17 \
            --settings compiler.libcxx=libc++ \
            --settings build_type=Release

      # ── Configure ────────────────────────────────────────────────────────────
      - name: Configure CMake — device (arm64-apple-ios)
        run: |
          cmake -B build-tsdf-ios-device -G Ninja \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/build-tsdf-ios-device/conan_toolchain.cmake" \
            -S dependency/manual/open3d-tsdf

      - name: Configure CMake — simulator (arm64-apple-ios-simulator)
        run: |
          # No Conan toolchain for the simulator — the generated file sets
          # CMAKE_OSX_SYSROOT=iphoneos with FORCE and cannot be overridden.
          # CMAKE_PREFIX_PATH points at the device Conan output so that
          # find_package(Eigen3) resolves via the same header-only Eigen3Config.cmake.
          cmake -B build-tsdf-ios-sim -G Ninja \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DCMAKE_OSX_SYSROOT=iphonesimulator \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/build-tsdf-ios-device" \
            -S dependency/manual/open3d-tsdf

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build — device
        run: cmake --build build-tsdf-ios-device --config Release --parallel $(sysctl -n hw.logicalcpu)

      - name: Build — simulator
        run: cmake --build build-tsdf-ios-sim --config Release --parallel $(sysctl -n hw.logicalcpu)

      # ── Package as fat XCFramework ────────────────────────────────────────────
      # Both slices go into one XCFramework; SwiftPM picks the right slice at
      # link time via the XCFramework's Info.plist automatically.
      # The zip is what SwiftPM fetches; compute-checksum is over the zip.
      - name: Package fat XCFramework
        run: |
          cmake --install build-tsdf-ios-device --prefix staging-tsdf-device
          cmake --install build-tsdf-ios-sim    --prefix staging-tsdf-sim

          xcodebuild -create-xcframework \
            -library staging-tsdf-device/lib/libopen3d_tsdf.a \
            -headers staging-tsdf-device/include \
            -library staging-tsdf-sim/lib/libopen3d_tsdf.a \
            -headers staging-tsdf-sim/include \
            -output open3d-tsdf-iOS.xcframework

          zip -r open3d-tsdf-iOS.xcframework.zip open3d-tsdf-iOS.xcframework
          swift package compute-checksum open3d-tsdf-iOS.xcframework.zip \
            > open3d-tsdf-iOS.xcframework.sha256
          echo "SHA-256: $(cat open3d-tsdf-iOS.xcframework.sha256)"

      # ── Create GitHub Release ─────────────────────────────────────────────────
      # Deletes any existing release for this tag before recreating, so
      # re-running the workflow always produces a fresh release.
      # After this runs, copy the new SHA-256 into iphone-3d-scanner:
      #   deps.json → cpp_deps.open3d_tsdf.xcframework.checksum
      #   Package.swift → .binaryTarget checksum
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="open3d-tsdf-ios-v${OPEN3D_VERSION}"
          NOTES=$(printf '%s\n\n%s\n\n%s\n%s\n%s' \
            "Static fat XCFramework build of the Open3D v${OPEN3D_VERSION} TSDF integration subsystem." \
            "Slices: arm64-apple-ios (device) + arm64-apple-ios-simulator" \
            "After downloading, update iphone-3d-scanner:" \
            "- deps.json -> cpp_deps.open3d_tsdf.xcframework.checksum" \
            "- Package.swift -> .binaryTarget checksum")
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" \
            open3d-tsdf-iOS.xcframework.zip \
            open3d-tsdf-iOS.xcframework.sha256 \
            --title "open3d-tsdf iOS fat v${OPEN3D_VERSION}" \
            --notes "$NOTES" \
            --latest
